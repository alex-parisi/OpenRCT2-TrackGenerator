# yamllint config — lints hand-authored track configs (examples/), not build
# artifacts.
extends: default

ignore: |
  build/
  dist/

rules:
  document-start: disable        # track configs don't use a leading '---'
  line-length:
    max: 100
    allow-non-breakable-words: true
  truthy:
    check-keys: false            # allow bare on/off/yes if used as values
